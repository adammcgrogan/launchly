{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Site.BusinessName}}{{if .Site.Tagline}} - {{.Site.Tagline}}{{end}}</title>
  <meta name="description" content="{{.Site.Tagline}}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','Segoe UI','sans-serif'] } } }
    }
  </script>
  {{template "theme" .}}
</head>
<body class="antialiased">
  {{template "site-content" .}}
  <footer class="py-8 text-center text-sm border-t" style="border-color:var(--border);background:var(--bg);color:var(--muted);">
    <p class="font-medium" style="color:var(--text);">{{.Site.BusinessName}}</p>
    {{if .Site.Address}}<p class="mt-1">{{.Site.Address}}</p>{{end}}
    <p class="mt-3 text-xs" style="color:var(--muted);">Powered by <a href="https://amgdigital.co" style="color:var(--accent);">AMG Digital</a></p>
  </footer>
</body>
</html>
{{end}}
