{{define "content"}}
<div class="min-h-[80vh] flex items-center justify-center bg-gray-50 py-16 px-6">
  <div class="text-center max-w-md">
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">✓</div>
    <h1 class="text-3xl font-black tracking-tight mb-3">We've got it!</h1>

</div>
