# fly.toml app configuration file generated for amg-digital on 2026-03-22T16:09:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'amg-digital'
primary_region = 'lhr'

[build]

[env]
  ADDR = ':8080'
  DOMAIN = 'amg-digital.fly.dev'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
